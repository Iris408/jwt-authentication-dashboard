name: Frontend CI 

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs: 
  frontend-check:
    runs-on: ubuntu-latest

    steps:
      # Step 1: checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Step 3: install dependencies
      - name: Install dependencies
        run: npm ci

      # Step 4: run lint
      - name: Run lint
        run: npm run lint      

      # Step 5: run build
      - name: Run build
        run: npm run build    